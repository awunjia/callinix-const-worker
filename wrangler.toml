name = "callinix-const-worker"
main = "worker/index.js"
compatibility_date = "2024-09-23"

# Runs automatically before `wrangler deploy` (creates ./dist)
[build]
command = "npm ci && npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

# Real app URL (staging or production origin the worker proxies to)
[vars]
APP_ORIGIN = "https://app.callinix.com"
TESTER_IPS = ""

# PREVIEW_SECRET and PROXY_HEADER_SECRET must be Wrangler SECRETS (encrypted).
# Plain-text dashboard variables are WIPED on each Git deploy — use:
#   npx wrangler secret put PREVIEW_SECRET
#   npx wrangler secret put PROXY_HEADER_SECRET
# Health check: https://dashboard.callinix.com/__callinx-health
